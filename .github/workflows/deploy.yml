name: Deploy

on:
  push:
    branches: [master, main]
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dataset & train model
        run: |
          python data/pipelines/generate_dataset.py
          python -m models.train_model

      - name: Build & push Docker image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASS" | docker login -u "$DOCKER_USER" --password-stdin
          docker build -t $DOCKER_USER/agropredic-sn:${{ github.ref_name }} .
          docker push $DOCKER_USER/agropredic-sn:${{ github.ref_name }}

      - name: Deploy to Streamlit Cloud (webhook)
        if: github.ref == 'refs/heads/master'
        env:
          STREAMLIT_DEPLOY_HOOK: ${{ secrets.STREAMLIT_DEPLOY_HOOK }}
        run: |
          if [ -n "$STREAMLIT_DEPLOY_HOOK" ]; then
            curl -X POST "$STREAMLIT_DEPLOY_HOOK"
            echo "Streamlit Cloud deploy triggered."
          else
            echo "STREAMLIT_DEPLOY_HOOK non configure - skipping."
          fi
